# Dependabot config for perch.
#
# - github-actions: 4 workflows (build / commit-lint / release /
#   update-tap) pin third-party actions (checkout, setup-xcode,
#   install-action, etc) by major version. Weekly update PRs keep
#   them honest without flooding the inbox.
# - swift: perch depends on the shared `sill` theming library (plan
#   atelier), pinned by url + SemVer in Package.swift with the lockfile
#   committed. Weekly PRs bump it within the `.upToNextMinor` range;
#   grouped so a multi-module sill release is one PR.
#
# Commit messages follow the gitmoji + Conventional Commits
# convention in docs/commit-convention.md so commit-lint.yml stays
# green on dependabot PRs.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: ":arrow_up: chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      swift:
        patterns:
          - "*"
    commit-message:
      prefix: ":arrow_up: chore"
      include: "scope"
    labels:
      - "dependencies"
      - "swift"
